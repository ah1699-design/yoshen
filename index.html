        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                text: "電感跟電容的個性永遠相反！既然電容穩態是開路(斷掉)；那電感穩態就是完全通暢的一條普通電線。這叫做什麼？",
                options: [
                    { text: "A. 短路 (一條線)", next: "q30", isCorrect: true },
                    { text: "B. 開路", next: "q30_help", log: "Q30救錯: 這是電容的狀態啦" }
                ]
            },

            // --- 第 31 關：交流有效值 ---
            "q31": {
                tag: "第 31 關：交流電",
                text: "家庭插座常說的「110V 交流電」，這個 110V 指的是交流波形的哪一種數值？",
                options: [
                    { text: "A. 有效值 (RMS值)", next: "q32", isCorrect: true },
                    { text: "B. 最大值 (峰值)", next: "q31_help", log: "Q31錯: 最大值其實是大約 155V" },
                    { text: "C. 平均值", next: "q31_help", log: "Q31錯: 弦波完整一週期的平均值是 0" },
                    { text: "D. 峰對峰值", next: "q31_help", log: "Q31錯: 那會是 310V" }
                ]
            },
            "q31_help": {
                tag: "💊 救援任務：做功的能力",
                text: "我們說的電壓，是指「這交流電產生熱能的能力，相當於多少伏特的直流電」。這種等效做功數值，稱為什麼值？",
                options: [
                    { text: "A. 有效值 (RMS)", next: "q31", isCorrect: true },
                    { text: "B. 最大值", next: "q31_help", log: "Q31救錯: 最大值只有瞬間達到，不能代表整體能力" }
                ]
            },

            // --- 第 32 關：市電頻率週期 ---
            "q32": {
                tag: "第 32 關：交流電",
                text: "台灣的市電頻率是 60 Hz。請問交流波形每完成「一個完整週期 (T)」，需要多少秒？",
                options: [
                    { text: "A. 1/60 秒", next: "q33", isCorrect: true },
                    { text: "B. 60 秒", next: "q32_help", log: "Q32錯: 那是頻率倒過來算" },
                    { text: "C. 1 秒", next: "q32_help", log: "Q32錯: 1秒內完成了 60 次" },
                    { text: "D. 0.6 秒", next: "q32_help", log: "Q32錯: 計算錯誤" }
                ]
            },
            "q32_help": {
                tag: "💊 救援任務：頻率與週期的倒數",
                text: "頻率 (f) 代表「1秒鐘轉幾圈」；週期 (T) 則是「轉1圈要幾秒」。兩者互為倒數： T = 1 / f。所以 60Hz 的週期是？",
                options: [
                    { text: "A. 1/60 秒", next: "q32", isCorrect: true },
                    { text: "B. 60 秒", next: "q32_help", log: "Q32救錯: 轉一圈要 60 秒也太慢了吧！" }
                ]
            },

            // --- 第 33 關：純電容相位 ---
            "q33": {
                tag: "第 33 關：基本交流電路",
                text: "在「純電容 (C)」的交流電路中，電壓 (V) 與電流 (I) 的相位關係為何？",
                options: [
                    { text: "A. 電流 (I) 超前電壓 (V) 90 度", next: "q34", isCorrect: true },
                    { text: "B. 電壓 (V) 超前電流 (I) 90 度", next: "q33_help", log: "Q33錯: 這是純電感的特性" },
                    { text: "C. 電壓與電流同相 (0度)", next: "q33_help", log: "Q33錯: 這是純電阻的特性" },
                    { text: "D. 電流反相 180 度", next: "q33_help", log: "Q33錯: 沒有這種元件" }
                ]
            },
            "q33_help": {
                tag: "💊 救援任務：口訣 ICE",
                text: "統測必背口訣「ICE (冰塊)」！中間是電容(C)，前面是電流(I)，後面是電壓(E/V)。這代表在電容(C)中，電流(I)跑在電壓(E)的前面！",
                options: [
                    { text: "A. 電流超前 90 度", next: "q33", isCorrect: true },
                    { text: "B. 電壓超前 90 度", next: "q33_help", log: "Q33救錯: 那是 ELI (電感) 的口訣喔！" }
                ]
            },

            // --- 第 34 關：阻抗定義 ---
            "q34": {
                tag: "第 34 關：交流阻抗",
                text: "交流電路中，將電阻 (R) 與電抗 (X) 組合起來，表示電路整體阻礙電流的能力，稱為什麼？(通常符號為 Z)",
                options: [
                    { text: "A. 阻抗 (Impedance)", next: "q35", isCorrect: true },
                    { text: "B. 導納 (Admittance)", next: "q34_help", log: "Q34錯: 導納是阻抗的倒數" },
                    { text: "C. 電感 (Inductance)", next: "q34_help", log: "Q34錯: 這只是 L" },
                    { text: "D. 磁抗 (Magnetic reactance)", next: "q34_help", log: "Q34錯: 名詞捏造" }
                ]
            },
            "q34_help": {
                tag: "💊 救援任務：綜合抵抗",
                text: "電阻 R 管發熱，電抗 X 管相位。把它們兩兄弟用畢氏定理合在一起，形成一個總抵抗力 Z。這個 Z 的中文叫什麼？",
                options: [
                    { text: "A. 阻抗", next: "q34", isCorrect: true },
                    { text: "B. 導納", next: "q34_help", log: "Q34救錯: 導納(Y) 是暢通的程度，是倒數啦" }
                ]
            },

            // --- 第 35 關：實功率單位 ---
            "q35": {
                tag: "第 35 關：交流功率",
                text: "在交流電路中，真正會消耗能量作功（例如發熱發光）的功率稱為「有效功率 (實功率, P)」。其單位為何？",
                options: [
                    { text: "A. 瓦特 (W)", next: "q36", isCorrect: true },
                    { text: "B. 伏安 (VA)", next: "q35_help", log: "Q35錯: 這是視在功率 S 的單位" },
                    { text: "C. 乏 (VAR)", next: "q35_help", log: "Q35錯: 這是無效(虛)功率 Q 的單位" },
                    { text: "D. 焦耳 (J)", next: "q35_help", log: "Q35錯: 這是能量單位，不是功率" }
                ]
            },
            "q35_help": {
                tag: "💊 救援任務：家裡的燈泡",
                text: "有效功率就像是你買燈泡時看的亮度指標，或是吹風機的耗電量。最常見的單位就是 W。",
                options: [
                    { text: "A. 瓦特 (W)", next: "q35", isCorrect: true },
                    { text: "B. 伏安 (VA)", next: "q35_help", log: "Q35救錯: 伏安是台電送過來的總功率單位" }
                ]
            },

            // --- 第 36 關：視在功率單位 ---
            "q36": {
                tag: "第 36 關：交流功率",
                text: "承上題，台電發電機送出來的總功率，包含了有效與無效功率，這稱為「視在功率 (S)」。其單位為何？",
                options: [
                    { text: "A. 伏安 (VA)", next: "q37", isCorrect: true },
                    { text: "B. 瓦特 (W)", next: "q36_help", log: "Q36錯: 這是有效功率" },
                    { text: "C. 乏 (VAR)", next: "q36_help", log: "Q36錯: 這是無效功率" },
                    { text: "D. 歐姆 (Ω)", next: "q36_help", log: "Q36錯: 這是電阻" }
                ]
            },
            "q36_help": {
                tag: "💊 救援任務：公式即單位",
                text: "視在功率 (S) 的公式最簡單，就是 電壓(V) 乘以 電流(I)。把 V 的單位「伏特」跟 I 的單位「安培」合在一起唸就是答案了！",
                options: [
                    { text: "A. 伏安 (VA)", next: "q36", isCorrect: true },
                    { text: "B. 瓦特 (W)", next: "q36_help", log: "Q36救錯: W 是有作功的有效功率喔" }
                ]
            },

            // --- 第 37 關：功率因數定義 ---
            "q37": {
                tag: "第 37 關：交流功率",
                text: "「功率因數 (Power Factor, PF)」代表著設備使用電力的效率。它的定義是哪兩個功率的比值？",
                options: [
                    { text: "A. 有效功率 (P) / 視在功率 (S)", next: "q38", isCorrect: true },
                    { text: "B. 無效功率 (Q) / 有效功率 (P)", next: "q37_help", log: "Q37錯: 這是 tanθ 的定義" },
                    { text: "C. 視在功率 (S) / 有效功率 (P)", next: "q37_help", log: "Q37錯: 上下顛倒了" },
                    { text: "D. 電壓 / 電流", next: "q37_help", log: "Q37錯: 這是阻抗 Z" }
                ]
            },
            "q37_help": {
                tag: "💊 救援任務：效率的意義",
                text: "效率就是「你真正用到的(P)」除以「總共給你多少(S)」。台電給了你 100 單位，你真正作功用了 80 單位，PF 就是 0.8！",
                options: [
                    { text: "A. 有效功率 / 視在功率", next: "q37", isCorrect: true },
                    { text: "B. 視在功率 / 有效功率", next: "q37_help", log: "Q37救錯: 這樣算出來效率大於1，違反物理法則！" }
                ]
            },

            // --- 第 38 關：諧振條件 ---
            "q38": {
                tag: "第 38 關：諧振電路",
                text: "在 RLC 串聯電路中，要發生「諧振 (Resonance)」的絕對條件是什麼？",
                options: [
                    { text: "A. 感抗等於容抗 (XL = XC)", next: "q39", isCorrect: true },
                    { text: "B. 電阻等於零 (R = 0)", next: "q38_help", log: "Q38錯: R是消耗能量的，不影響諧振點" },
                    { text: "C. 感抗大於容抗 (XL > XC)", next: "q38_help", log: "Q38錯: 這樣呈電感性" },
                    { text: "D. 電流為零", next: "q38_help", log: "Q38錯: 串聯諧振電流最大" }
                ]
            },
            "q38_help": {
                tag: "💊 救援任務：完美的抵消",
                text: "諧振的本質，就是電感(L)跟電容(C)兩個死對頭的能量「完全抵消」。既然要完全抵消，它們的抵抗力當然要？",
                options: [
                    { text: "A. 完全相等 (XL = XC)", next: "q38", isCorrect: true },
                    { text: "B. 一大一小", next: "q38_help", log: "Q38救錯: 一大一小就沒辦法抵消了啊！" }
                ]
            },

            // --- 第 39 關：串聯諧振特性 ---
            "q39": {
                tag: "第 39 關：諧振電路",
                text: "承上題，當 RLC「串聯」電路發生諧振時，電路的「總阻抗 (Z)」與「總電流 (I)」會呈現什麼極端狀態？",
                options: [
                    { text: "A. 阻抗最小，電流最大", next: "q40", isCorrect: true },
                    { text: "B. 阻抗最大，電流最小", next: "q39_help", log: "Q39錯: 這是並聯諧振的特性" },
                    { text: "C. 阻抗無限大，電流為零", next: "q39_help", log: "Q39錯: 這是斷路" },
                    { text: "D. 阻抗與電流皆為零", next: "q39_help", log: "Q39錯: 還有電阻R在，阻抗不會是零" }
                ]
            },
            "q39_help": {
                tag: "💊 救援任務：阻抗消失術",
                text: "因為 XL = XC 互相減掉抵消了，總阻抗只剩下孤單的電阻 R，阻力降到了「最低點」。阻力變小，電流理所當然會？",
                options: [
                    { text: "A. 電流最大", next: "q39", isCorrect: true },
                    { text: "B. 電流最小", next: "q39_help", log: "Q39救錯: 阻力小水流大，歐姆定律！" }
                ]
            },

            // --- 第 40 關：品質因數 Q ---
            "q40": {
                tag: "第 40 關：諧振電路",
                text: "諧振電路中，「品質因數 (Q值)」代表電路的頻率選擇性。當 Q 值「越大」時，頻寬 (BW) 會如何變化？",
                options: [
                    { text: "A. 頻寬越小 (選擇性越尖銳)", next: "q41", isCorrect: true },
                    { text: "B. 頻寬越大 (選擇性越差)", next: "q40_help", log: "Q40錯: Q 與 BW 成反比" },
                    { text: "C. 頻寬不變", next: "q40_help", log: "Q40錯: 會受影響" },
                    { text: "D. 頻寬變成零", next: "q40_help", log: "Q40錯: 只有理想無損元件才會為零" }
                ]
            },
            "q40_help": {
                tag: "💊 救援任務：高畫質收音機",
                text: "公式：Q = fr / BW。Q 值越高，代表收音機調頻越精準，只會讓一小段特定的頻率通過，不會聽到隔壁電台的雜音。所以通過的寬度(頻寬)會？",
                options: [
                    { text: "A. 頻寬越小 (越窄越精準)", next: "q40", isCorrect: true },
                    { text: "B. 頻寬越大", next: "q40_help", log: "Q40救錯: 寬度太大就會聽到雜訊啦" }
                ]
            },

            // --- 第 41 關：三相 Y 接 ---
            "q41": {
                tag: "第 41 關：三相電源",
                text: "在平衡的「三相 Y 型接法」中，外部的「線電壓 (V_L)」與內部的「相電壓 (V_P)」大小關係為何？",
                options: [
                    { text: "A. V_L = √3 V_P", next: "q42", isCorrect: true },
                    { text: "B. V_L = V_P", next: "q41_help", log: "Q41錯: 這是 Δ 接法的特性" },
                    { text: "C. V_L = 3 V_P", next: "q41_help", log: "Q41錯: 三相交流倍率是根號3" },
                    { text: "D. V_L = V_P / √3", next: "q41_help", log: "Q41錯: 外部線電壓比較大" }
                ]
            },
            "q41_help": {
                tag: "💊 救援任務：Y字跨步",
                text: "Y 型接法就像兩腿劈開，外部的線跨越了兩條腿(兩個相)。120度相位差相加後，電壓會放大成經典的幾倍？",
                options: [
                    { text: "A. √3 倍", next: "q41", isCorrect: true },
                    { text: "B. 3 倍", next: "q41_help", log: "Q41救錯: 是根號 3 才對喔！" }
                ]
            },

            // --- 第 42 關：三相 Δ 接 ---
            "q42": {
                tag: "第 42 關：三相電源",
                text: "在平衡的「三相 Δ 型 (三角) 接法」中，外部的「線電流 (I_L)」與內部的「相電流 (I_P)」大小關係為何？",
                options: [
                    { text: "A. I_L = √3 I_P", next: "q43", isCorrect: true },
                    { text: "B. I_L = I_P", next: "q42_help", log: "Q42錯: 這是 Y 接法的特性" },
                    { text: "C. I_L = 3 I_P", next: "q42_help", log: "Q42錯: 交流相加倍率是根號3" },
                    { text: "D. V_L = √3 V_P", next: "q42_help", log: "Q42錯: 題目問的是電流" }
                ]
            },
            "q42_help": {
                tag: "💊 救援任務：Δ節點匯流",
                text: "Δ 接法的每個角角都有兩條路匯合流出去。所以「電流」會變大，倍率一樣是交流電神聖的那個數字：",
                options: [
                    { text: "A. √3 倍", next: "q42", isCorrect: true },
                    { text: "B. 相等不變", next: "q42_help", log: "Q42救錯: 兩條水管匯流一定會變大！" }
                ]
            },

            // --- 第 43 關：單相用銅量 ---
            "q43": {
                tag: "第 43 關：單相用電",
                text: "統測必考！傳輸相同功率下，單相三線式 (1Φ3W) 的總用銅量，是單相二線式 (1Φ2W) 的多少倍？",
                options: [
                    { text: "A. 3/8 倍 (37.5%)", next: "q44", isCorrect: true },
                    { text: "B. 3/4 倍 (75%)", next: "q43_help", log: "Q43錯: 這是三相三線的比率" },
                    { text: "C. 8/3 倍", next: "q43_help", log: "Q43錯: 1Φ3W 比較省銅，倍率應小於1" },
                    { text: "D. 1/3 倍", next: "q43_help", log: "Q43錯: 數值不對" }
                ]
            },
            "q43_help": {
                tag: "💊 救援任務：超省錢配電",
                text: "因為 1Φ3W 利用 220V 傳輸讓電流減半，所以電線可以買很細的！死背密碼：八分之三。",
                options: [
                    { text: "A. 3/8", next: "q43", isCorrect: true },
                    { text: "B. 3/4", next: "q43_help", log: "Q43救錯: 那是別的電路的答案喔" }
                ]
            },

            // --- 第 44 關：變壓器 V-V 容量 ---
            "q44": {
                tag: "第 44 關：變壓器接線",
                text: "三台變壓器原本接成 Δ-Δ 供電，若燒毀一台改成 V-V 接線，其總供電容量會剩下原本 Δ-Δ 總容量的百分之多少？",
                options: [
                    { text: "A. 57.7% (即 1/√3)", next: "q45", isCorrect: true },
                    { text: "B. 86.6% (即 √3/2)", next: "q44_help", log: "Q44錯: 這是利用率" },
                    { text: "C. 66.7%", next: "q44_help", log: "Q44錯: 不能單純用 2/3 來算" },
                    { text: "D. 33.3%", next: "q44_help", log: "Q44錯: 太低了" }
                ]
            },
            "q44_help": {
                tag: "💊 救援任務：容量密碼 577",
                text: "這也是死背題！壞掉一台後，總容量會剩下「根號三分之一」。換算成百分比，開頭是 57。是多少？",
                options: [
                    { text: "A. 57.7%", next: "q44", isCorrect: true },
                    { text: "B. 86.6%", next: "q44_help", log: "Q44救錯: 86.6 是變壓器『利用率』的答案喔" }
                ]
            },

            // --- 第 45 關：雙瓦特計 PF=1 (最終魔王) ---
            "q45": {
                tag: "🏆 最終關：雙瓦特計法",
                text: "45題大挑戰最後一關！使用「雙瓦特計法」量測三相功率時，如果發現兩顆電表的讀值完全一樣 (W1 = W2)，這代表此負載是純電阻，其功率因數 (PF) 等於多少？",
                options: [
                    { text: "A. 1.0", next: "end", isCorrect: true },
                    { text: "B. 0.5", next: "q45_help", log: "Q45錯: 0.5 是一表為零的時候" },
                    { text: "C. 0", next: "q45_help", log: "Q45錯: 0 是兩表數值相同但一正一負" },
                    { text: "D. 0.866", next: "q45_help", log: "Q45錯: 數值不對" }
                ]
            },
            "q45_help": {
                tag: "💊 救援任務：完美的純電阻",
                text: "如果 W1 = W2，相減 (虛功率) 會等於 0。沒有虛功率代表它是一個完美、100% 都在作功的純電阻！最高效率(PF)是多少？",
                options: [
                    { text: "A. 1.0", next: "q45", isCorrect: true },
                    { text: "B. 0.5", next: "q45_help", log: "Q45救錯: 1.0 才是完美的 100% 啦！" }
                ]
            }
        };

        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 修正預設卡包對應正確的 Key
        let currentPackId = "phase1"; 
	const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';

        // 初始化卡包選單 (立即執行，不依賴 window.onload 以防某些平台吃掉事件)
        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                // 如果卡包裡面沒有卡片，就不顯示該選項
                if (cardPacks[key].cards.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }
        initPackSelector();

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.trim();
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerText = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            // 安全性防呆：確保所選卡包存在
            if (!cardPacks[currentPackId]) currentPackId = "phase1";
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }

        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData });
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let response = await fetch(scriptURL + "?name=" + encodeURIComponent(inputName), { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    localStorage.setItem("gachaCollection_" + inputName, result.data);
                    alert("✅ 雲端同步成功！已為您載入最新的圖鑑進度！\n您可以點擊「查看我的圖鑑」確認。");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
